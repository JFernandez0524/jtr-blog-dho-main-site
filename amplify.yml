version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - echo "GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY" >> .env.production
        - echo "BRIDGE_DATA_API_KEY=$BRIDGE_DATA_API_KEY" >> .env.production
        - echo "GHL_API_TOKEN=$GHL_API_TOKEN" >> .env.production
        - echo "GHL_LOCATION_ID=$GHL_LOCATION_ID" >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*